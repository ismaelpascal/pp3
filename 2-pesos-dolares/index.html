<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Pesos a Dolares</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <div class="side-buttons left">
            <button class="atm-btn"></button>
            <button class="atm-btn"></button>
            <button class="atm-btn"></button>
            <button class="atm-btn"></button>
        </div>

        <div class="container">
            <div class="converter-box">
                <div class="left-section">
                    <h1 class="main-title">conversor de <span class="ars">ARS</span> a <span class="usd">USD</span></h1>
                    
                    <div class="numpad-box">
                        <div class="display-container">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="ars-input" placeholder="0" min="0">
                        </div>
                        <div class="numpad">
                            <button class="num-btn">1</button>
                            <button class="num-btn">2</button>
                            <button class="num-btn">3</button>
                            <button class="num-btn"></button>

                            <button class="num-btn">4</button>
                            <button class="num-btn">5</button>
                            <button class="num-btn">6</button>
                            <button class="num-btn"></button>

                            <button class="num-btn">7</button>
                            <button class="num-btn">8</button>
                            <button class="num-btn">9</button>
                            <button class="num-btn">C</button>

                            <button class="num-btn"></button>
                            <button class="num-btn">0</button>
                            <button class="calc-action" id="calc-btn">OK</button>
                        </div>
                    </div>
                </div>

                <div class="right-section" id="dollar-cards-container">
                    <div class="card-placeholder">Cargando cotizaciones...</div>
                </div>
            </div>
        </div>

        <div class="side-buttons right">
            <button class="atm-btn"></button>
            <button class="atm-btn"></button>
            <button class="atm-btn"></button>
            <button class="atm-btn"></button>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="main.js"></script>
</body>

</html>
