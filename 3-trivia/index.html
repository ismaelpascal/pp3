<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia de Cortina</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="curtain-container">
        <div class="curtain-panel left-panel"></div>
        <div class="curtain-panel right-panel"></div>
    </div>

    <main id="app">
        <div id="setup-screen">
            <h1>Nueva Trivia</h1>
            <p style="margin-bottom: 20px;">Selecciona una categoría para empezar.</p>
            <select name="categoria" id="categoria">
                <option value="">-- Elige una categoría --</option>
                <option value="Historia">Historia</option>
                <option value="Geografía">Geografía</option>
                <option value="Ciencia">Ciencia</option>
                <option value="Deportes">Deportes</option>
                <option value="Tecnología">Tecnología</option>
                <option value="Matemática">Matemática</option>
            </select>
            <button id="start-btn">Iniciar</button>
        </div>

        <div id="game-screen" style="display: none;">
            <h2 id="pregunta-numero" style="margin-bottom: 20px; font-size: 18px; color: #555;"></h2>
            <div id="pregunta-container">
                <p id="pregunta-texto" style="font-size: 20px; font-weight: bold; margin-bottom: 20px;"></p>
                <div id="opciones-container"></div>
                <div id="feedback-container"></div>
                <button id="next-btn" style="display: none; margin-top: 20px;">Siguiente Pregunta</button>
            </div>
        </div>

        <div id="result-screen" style="display: none;">
            <h1>Fin de la Partida</h1>
            <p>Total de preguntas: <span id="total-preguntas"></span></p>
            <p>Correctas: <span id="correctas-count" style="color: green; font-weight: bold;"></span></p>
            <p>Incorrectas: <span id="incorrectas-count" style="color: red; font-weight: bold;"></span></p>
            <button id="restart-game" style="margin-top: 20px;">Volver a Empezar</button>
        </div>
    </main>

    <script type="module" src="main.js"></script>
</body>

</html>
